<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            min-height: 100vh;
            min-height: 100dvh;
            /* For mobile browsers */
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient( 225deg, #000000, #1a002e, #3c0053, #2d0066, #000000);
            background-size: 300% 300%;
            animation: gradientFlow 20s ease infinite;
            position: relative;
            padding: 1rem;
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
        }
        
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient( 125deg, transparent 0%, transparent 40%, rgba(255, 255, 255, 0.02) 50%, transparent 60%, transparent 100%);
            background-size: 200% 200%;
            animation: shimmer 8s linear infinite;
            pointer-events: none;
        }
        
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        
        .contact-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            border-radius: clamp(15px, 3vw, 20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: min(90%, 400px);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: auto;
        }
        
        .profile-image-container {
            width: min(250px, 60vw);
            /* Further increased size */
            height: min(250px, 60vw);
            /* Further increased size */
            margin: 0 auto 2rem;
        }
        
        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(157, 78, 221, 0.5);
            animation: pulse 3s infinite;
        }
        
        .profile-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(157, 78, 221, 0.2);
            filter: blur(10px);
            animation: glow 3s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }
        
        @keyframes glow {
            0% {
                opacity: 0.5;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                opacity: 0.5;
            }
        }
        
        h1 {
            color: white;
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
            letter-spacing: 2px;
        }
        
        .contact-links {
            display: grid;
            gap: clamp(0.8rem, 2vw, 1rem);
        }
        
        .contact-link {
            display: flex;
            align-items: center;
            padding: clamp(0.8rem, 2.5vw, 1rem);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Touch device optimization */
        
        @media (hover: hover) {
            .contact-link:hover {
                transform: translateY(-5px);
                background: rgba(157, 78, 221, 0.15);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(157, 78, 221, 0.3);
            }
            .contact-link:hover .logo {
                fill: #bd93f9;
            }
        }
        /* Active state for touch devices */
        
        .contact-link:active {
            transform: scale(0.98);
            background: rgba(157, 78, 221, 0.15);
        }
        
        .logo {
            width: clamp(24px, 6vw, 30px);
            height: clamp(24px, 6vw, 30px);
            margin-right: clamp(0.8rem, 2vw, 1rem);
            fill: white;
            transition: fill 0.3s ease;
            flex-shrink: 0;
        }
        
        .contact-link span {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .contact-link:nth-child(1) {
            animation-delay: 0.1s;
        }
        
        .contact-link:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .contact-link:nth-child(3) {
            animation-delay: 0.3s;
        }
        
        .contact-link:4nth-child(4) {
            animation-delay: 0.4s;
        }
        /* Landscape mode optimization */
        
        @media (max-height: 600px) and (orientation: landscape) {
            .contact-container {
                display: grid;
                grid-template-columns: auto 1fr;
                gap: 2rem;
                text-align: left;
                max-width: 600px;
                align-items: center;
            }
            .profile-image-container {
                margin: 0;
                width: min(120px, 25vh);
                height: min(120px, 25vh);
            }
            h1 {
                margin-bottom: 1rem;
            }
        }
        /* Ensure text remains readable on very small screens */
        
        @media (max-width: 320px) {
            .contact-link span {
                font-size: 0.85rem;
            }
            .logo {
                width: 22px;
                height: 22px;
                margin-right: 0.6rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
        /* Large screen optimization */
        
        @media (min-width: 1200px) {
            .contact-container {
                max-width: 450px;
            }
            .contact-link {
                padding: 1.2rem;
            }
        }
    </style>
</head>
